<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Website Project Portal | Next Print NY</title><link rel="stylesheet" href="/websites-demo/sales.css?v=20260621-sales-funnel" /></head>
  <body class="website-form-page"><main class="form-shell"><div class="form-brand"><a href="/websites-demo/"><img src="/assets/logo-clear.svg" alt="Next Print NY" /></a><a href="/websites-demo/">Website plans</a></div><section class="form-card"><p class="eyebrow">Step 3 of 3</p><h1>Build your project brief.</h1><p>Order <strong id="portalOrder">pending</strong>. Add the content and direction your designer needs. You can return later with the same browser to update this brief.</p><form id="portalForm"><div class="form-grid"><label>Business name<input name="businessName" required /></label><label>Contact name<input name="name" required /></label><label>Phone<input name="phone" required /></label><label>Email<input name="email" type="email" required /></label><fieldset><legend>Pages to build</legend><div class="payment-choice"><label><input type="checkbox" name="pages" value="Home" checked /> Home</label><label><input type="checkbox" name="pages" value="Services" checked /> Services</label><label><input type="checkbox" name="pages" value="About" /> About</label><label><input type="checkbox" name="pages" value="Gallery" /> Gallery</label><label><input type="checkbox" name="pages" value="Contact" checked /> Contact</label><label><input type="checkbox" name="pages" value="Online Store" /> Online store</label></div></fieldset><fieldset><legend>Features you need</legend><div class="payment-choice"><label><input type="checkbox" name="features" value="Quote form" /> Quote form</label><label><input type="checkbox" name="features" value="Booking" /> Booking</label><label><input type="checkbox" name="features" value="Online payments" /> Payments</label><label><input type="checkbox" name="features" value="CRM or lead capture" /> CRM / leads</label><label><input type="checkbox" name="features" value="WhatsApp" /> WhatsApp</label><label><input type="checkbox" name="features" value="Multi-language" /> Multi-language</label></div></fieldset><label class="full">Brand colors, social links and inspiration<textarea name="brand" placeholder="Share colors, Instagram/Facebook links, websites you like and what you like about them."></textarea></label><label class="full">Tell us about your business and the website you want<textarea name="notes" required placeholder="Services, target customers, key messages, calls to action and any notes for your designer."></textarea></label><label class="full">Upload helpful files (logo, photos, menu or brochure)<input name="files" type="file" multiple accept="image/png,image/jpeg,image/webp,application/pdf" /></label></div><button class="form-submit" type="submit">Send project brief to Next Print NY</button><p id="portalStatus" class="form-status" role="status"></p></form></section></main><script src="/websites-demo/portal/portal.js?v=20260621-sales-funnel"></script></body>
</html>
