<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Secure Project Portal | Next Print NY</title>
  <link rel="icon" href="/assets/logo.png">
  <link rel="stylesheet" href="/project-portal.css">
</head>
<body>
  <header class="portal-header"><a href="/"><img src="/assets/logo.png" alt="Next Print NY"></a><div><button id="langEn" type="button">EN</button><button id="langEs" type="button">ES</button></div></header>
  <main id="portal" class="portal" aria-live="polite"><p class="loading">Loading secure portal…</p></main>
  <dialog id="zelleModal"><form id="zelleForm" method="dialog"><button class="close" value="cancel" aria-label="Close">×</button><img src="/assets/logo.png" alt="Next Print NY"><p class="eyebrow">SECURE ZELLE PAYMENT</p><h2>Pay with Zelle</h2><dl id="zelleDetails"></dl><p>Send the exact amount using Zelle. Include the estimate number in the memo. Payments are verified manually by Next Print NY.</p><label>Confirmation or reference number <input id="paymentReference" maxlength="100" placeholder="Optional"></label><label>Payment screenshot <input id="paymentProof" type="file" accept="image/png,image/jpeg,image/webp"></label><button class="primary" id="zelleSubmit" value="submit">I Sent My Zelle Payment</button><p id="paymentStatus"></p></form></dialog>
  <script src="/project-portal.js"></script>
</body>
</html>
